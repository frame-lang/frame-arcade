; ============================================================
; Frame Arcade — Godot export presets
; ============================================================
; Two presets, both targeting itch.io:
;
;   [Web]    →  ../dist/web/index.html  + .pck + .wasm + .js
;              Plays in-browser (itch.io's "HTML5 game" type).
;              Save state goes to IndexedDB via Godot's user://
;              filesystem mapping; persists across sessions.
;
;   [macOS]  →  ../dist/mac/FrameArcade.zip
;              Universal binary (x86_64 + arm64). Unsigned —
;              users will need to right-click → Open the first
;              time (Gatekeeper warning). itch.io's app handles
;              this gracefully.
;
; Linux / Windows can be added later by copying the macOS shape
; and changing platform + binary_format.
;
; Build via `arcade/dist.sh`; output goes to `arcade/dist/`
; (gitignored). The dist.sh wrapper transpiles Frame → GDScript
; first so the export picks up the freshest scripts.
; ============================================================

[preset.0]

name="Web"
platform="Web"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="../dist/web/index.html"
patches=PackedStringArray()
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
variant/extensions_support=false
vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=false
html/export_icon=true
html/custom_html_shell=""
html/head_include=""
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
progressive_web_app/enabled=false
progressive_web_app/ensure_cross_origin_isolation_headers=true
progressive_web_app/offline_page=""
progressive_web_app/display=1
progressive_web_app/orientation=0
progressive_web_app/icon_144x144=""
progressive_web_app/icon_180x180=""
progressive_web_app/icon_512x512=""
progressive_web_app/background_color=Color(0, 0, 0, 1)

