name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A single job: install framec + Godot, transpile every
# chapter, then run CCA's smoke suite. CCA is the only
# chapter with executable smoke tests right now (the eight
# arcade games rely on visual / interactive verification);
# build_all.sh confirms framec at least accepts every Frame
# source file in the repo.
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Cache cargo registry + framec build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/framec
          # Include the framec version in the cache key so a
          # version bump in the Install step actually triggers
          # a fresh install (otherwise the stale binary persists).
          key: ${{ runner.os }}-framec-4.1.1
          restore-keys: |
            ${{ runner.os }}-framec-

      - name: Install framec
        # framec 4.1.1: ships RFC-0014 (@@[main]), RFC-0015
        # (@@[persist]/@@[save]/@@[load] system-level form),
        # RFC-0012 amendment (@@[no_persist] per-field), and the
        # GDScript backend's var_to_bytes save format (which fixes
        # the Array<int>→Array<float> JSON deserialization bug
        # reported as framec _scratch/FRAMEC_BUGS.md Issue #4).
        # All required by the V1.2 CCA source.
        run: |
          if ! command -v framec >/dev/null 2>&1; then
            cargo install framec --version 4.1.1 --locked
          fi
          framec --version

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot/godot
          key: ${{ runner.os }}-godot-4.6.2-stable

      - name: Install Godot 4.6.2 (headless)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot
          cd ~/godot
          curl -L -o godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip"
          unzip -q godot.zip
          mv Godot_v4.6.2-stable_linux.x86_64 godot
          chmod +x godot

      - name: Add Godot to PATH
        run: echo "$HOME/godot" >> $GITHUB_PATH

      - name: Verify toolchain
        run: |
          framec --version
          godot --version

      - name: Build all chapters (transpile every Frame source)
        run: ./build_all.sh

      - name: CCA driver-drift detector
        run: python3 cca/scripts/check_cca_drift.py

      - name: CCA canon audit regression guard
        # V1.2 floor: 18 LEFT-ONLY canon strings (down from 71 at
        # the start of V1.1; see cca/V1_REVIEW.md §1). A regression
        # bumps the count and fails CI.
        run: |
          cd cca
          out=$(python3 canon/audit_string_join.py 2>&1)
          left=$(echo "$out" | grep -oE 'LEFT-ONLY \([0-9]+\)' | grep -oE '[0-9]+' || echo 999)
          echo "Canon LEFT-ONLY count: $left (floor: 18)"
          if [ "$left" -gt 18 ]; then
            echo "FAIL — canon audit regressed past the V1.2 floor"
            exit 1
          fi

      - name: Run CCA smoke suite (64 tests)
        run: |
          cd cca
          ./run_tests.sh

      - name: Run arcade smoke tests
        run: |
          cd arcade
          ./run_smoke_test.sh

      - name: Summarise
        if: always()
        run: |
          echo "=== Summary ==="
          echo "Chapters built: $(ls -d ch??-* cca | wc -l)"
          echo "CCA tests:      $(ls cca/tests/test_cca_*.gd | wc -l)"
          echo "Arcade smoke:   $(ls arcade/tests/test_arcade_*_smoke.gd 2>/dev/null | wc -l)"
